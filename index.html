<!DOCTYPE html>
<html lang="en">
<head>
 <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vibe ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Outfit:wght@400;900&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: flow 18s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; color: white;
            position: relative;
        }

        @keyframes flow { 0% { background-position: 0% 82%; } 50% { background-position: 100% 19%; } 100% { background-position: 0% 82%; } }

        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0;
            pointer-events: none; animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        header { text-align: center; padding: 30px 10px; z-index: 10; width: 100%; }
        h1 { font-family: 'Fredoka', sans-serif; font-size: clamp(2.2rem, 8vw, 3.5rem); text-shadow: 0 5px 15px rgba(0,0,0,0.3); margin: 0; }

        .meter-box { width: 80%; max-width: 400px; height: 12px; background: rgba(0,0,0,0.2); border-radius: 50px; margin: 20px auto; border: 2px solid rgba(255,255,255,0.4); overflow: hidden; }
        #bar { height: 100%; width: 0%; background: linear-gradient(90deg, #fff, #70e1ff); box-shadow: 0 0 15px #fff; transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; max-width: 800px; padding: 10px; z-index: 10; margin-bottom: 30px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .btn { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.3); padding: 25px 5px; border-radius: 15px; color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn.clicked { background: rgba(255, 255, 255, 0.4); border-color: #fff; transform: scale(0.95); }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal { background: white; padding: 35px 25px; border-radius: 25px; text-align: center; max-width: 400px; width: 100%; color: #333; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

        .next-btn { background: linear-gradient(90deg, #ff2400, #2b1de8); color: white; padding: 12px 35px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-family: 'Outfit', sans-serif; }

        #final-page { 
            display: none; text-align: center; 
            margin: 20px auto; width: 85%; max-width: 500px;
            background: rgba(255,255,255,0.12); 
            padding: 40px 20px; 
            border-radius: 35px; border: 2px solid white; 
            backdrop-filter: blur(12px); z-index: 10;
            max-height: 75vh; overflow-y: auto; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .particle { position: fixed; pointer-events: none; animation: fall 3.5s ease-in forwards; z-index: 20; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<header>
    <h1>The Vibe ✨</h1>
    <div class="meter-box"><div id="bar"></div></div>
</header>

<div id="main-content">
    <div class="grid">
        <button class="btn" onclick="openBox(this, 'smile')">Smile 😊</button>
        <button class="btn" onclick="openBox(this, 'eyes')">Eyes ✨</button>
        <button class="btn" onclick="openBox(this, 'vibe')">Vibe ⚡</button>
        <button class="btn" onclick="openBox(this, 'hasi')">Hasi 😂</button>
        <button class="btn" onclick="openBox(this, 'baat')">Baat 🗣️</button>
        <button class="btn" onclick="openBox(this, 'aura')">Aura 🌟</button>
        <button class="btn" onclick="openBox(this, 'peace')">Sukoon ❤️</button>
        <button class="btn" onclick="openBox(this, 'magic')">Magic 🪄</button>
    </div>
</div>

<div id="final-page">
    <h2 style="font-size: clamp(1.8rem, 7vw, 2.8rem); margin-bottom: 20px;">Tum Aur Tumhari Baatein ❤️</h2>
    <div style="font-size: clamp(1.1rem, 4.5vw, 1.5rem); line-height: 1.7; font-style: italic;">
        "Zaroorat nahi mujhe kisi aur sahare ki,<br>
        Bas ek jhalak kaafi hai tumhare muskurane ki...<br><br>
        Duniya ki har khushi ek taraf,<br>
        Aur ek taraf ye khushi tumse dil lagane ki."
    </div>
    <button class="next-btn" style="background: white; color: #ff2400; margin-top: 30px;" onclick="location.reload()">Reset ✨</button>
</div>

<div id="overlay">
    <div class="modal">
        <div id="message" style="font-size: 1.25rem; margin-bottom: 15px; line-height: 1.6; font-weight: 500;"></div>
        <button class="next-btn" onclick="closeBox()">Next ✨</button>
    </div>
</div>

<script>
    const startTime = 48; 
    const endTime = 108;   
    let musicStarted = false;

    function createStars() {
        for (let i = 0; i < 45; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(star);
        }
    }
    createStars();

    const content = {
        smile: "Teri smile ekdum 'electric' hai, pura din charge kar deti hai! 😊",
        eyes: "Teri aankhon mein wo depth hai jo kisi aur mein nahi. 👀",
        vibe: "Log aesthetic dhoondte hain, mere liye teri vibe hi kafi hai. ⚡",
        hasi: "Teri hasi sun loon toh mera mood instantly 'refresh' ho jata hai. 😂",
        baat: "Tujhse baat karte waqt waqt ka pata hi nahi chalta. 🗣️",
        aura: "Tere paas hone se hi har jagah positive energy aa jati hai. ✨",
        peace: "Tu sirf meri crush nahi, meri sukoon hai. ❤️",
        magic: "Tujhse milna mere liye kisi magic se kam nahi thaa. 🪄"
    };

    let count = 0;
    let clicked = new Set();

    function openBox(btn, key) {
        const music = document.getElementById('bgMusic');
        
        if (!musicStarted || music.paused) {
            music.currentTime = startTime;
            music.volume = 0.5;
            music.play().then(() => {
                musicStarted = true;
            }).catch(e => console.log("Waiting for user interaction"));

            music.ontimeupdate = function() {
                if (music.currentTime >= endTime) {
                    music.currentTime = startTime;
                }
            };
        }

        document.getElementById('message').innerText = content[key];
        document.getElementById('overlay').style.display = 'flex';
        btn.classList.add('clicked');
        
        if(!clicked.has(key)) {
            clicked.add(key);
            count += 12.5;
            document.getElementById('bar').style.width = count + '%';
        }

        if(clicked.size === 8) {
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('final-page').style.display = 'block';
                setInterval(spawnParticle, 180);
            }, 800);
        }
    }

    function closeBox() { document.getElementById('overlay').style.display = 'none'; }

    function spawnParticle() {
        const s = document.createElement('div');
        s.className = 'particle';
        s.innerHTML = ['✨', '💖', '⭐', '❤️', '🌸'][Math.floor(Math.random()*5)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = '-50px';
        s.style.fontSize = '26px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 3500);
    }
</script>
</body>
</html>
